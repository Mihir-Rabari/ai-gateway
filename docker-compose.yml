services:

  # ──────────────────────────────────────────────
  # PostgreSQL — Primary Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateway_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ai_gateway}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/postgres-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gateway_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis — Cache + Sessions + Rate Limiting
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Zookeeper — Required by Kafka
  # ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Kafka — Event Streaming
  # ──────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - '9092:9092'
      - '29092:29092'
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'localhost:9092']
      interval: 10s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────
  # Kafka Init — Creates Topics
  # ──────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      kafka-topics --create --if-not-exists --topic usage.events --bootstrap-server kafka:29092
      kafka-topics --create --if-not-exists --topic credit.events --bootstrap-server kafka:29092
      kafka-topics --create --if-not-exists --topic auth.events --bootstrap-server kafka:29092
      kafka-topics --create --if-not-exists --topic billing.events --bootstrap-server kafka:29092
      kafka-topics --create --if-not-exists --topic routing.events --bootstrap-server kafka:29092

  # ──────────────────────────────────────────────
  # ClickHouse — Analytics Database
  # ──────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.5
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-ai_gateway_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    ports:
      - '8123:8123'  # HTTP interface
      - '9000:9000'  # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8123/ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # ClickHouse Init — Creates Schema
  # ──────────────────────────────────────────────
  clickhouse-init:
    image: curlimages/curl:latest
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./infra/db/clickhouse-schema.sql:/infra/db/clickhouse-schema.sql
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      until curl -sf "http://clickhouse:8123/ping"; do sleep 2; done
      curl -X POST "http://clickhouse:8123/" --data-binary @/infra/db/clickhouse-schema.sql

  # ──────────────────────────────────────────────
  # Kafka UI (development only)
  # ──────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - '8080:8080'
    profiles:
      - dev-tools

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
