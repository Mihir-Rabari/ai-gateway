version: '3.9'

services:

  # ──────────────────────────────────────────────
  # PostgreSQL — Primary Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateway_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ai_gateway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/postgres-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gateway_user}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # Redis — Cache + Sessions + Rate Limiting
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # Zookeeper — Required by Kafka
  # ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # Kafka — Event Streaming
  # ──────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'localhost:9092']
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # Kafka Init — Creates Topics
  # ──────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      kafka-topics --create --if-not-exists --topic usage.events --bootstrap-server kafka:29092
      kafka-topics --create --if-not-exists --topic credit.events --bootstrap-server kafka:29092
      kafka-topics --create --if-not-exists --topic auth.events --bootstrap-server kafka:29092
      kafka-topics --create --if-not-exists --topic billing.events --bootstrap-server kafka:29092
      kafka-topics --create --if-not-exists --topic routing.events --bootstrap-server kafka:29092
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # ClickHouse — Analytics Database
  # ──────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.5
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-ai_gateway_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8123/ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # ClickHouse Init — Creates Schema
  # ──────────────────────────────────────────────
  clickhouse-init:
    image: curlimages/curl:latest
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./infra/db/clickhouse-schema.sql:/infra/db/clickhouse-schema.sql
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      until curl -sf "http://clickhouse:8123/ping"; do sleep 2; done
      curl -X POST "http://clickhouse:8123/" --data-binary @/infra/db/clickhouse-schema.sql
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # Kafka UI (development only)
  # ──────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    profiles:
      - dev-tools
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # 1. Auth Service
  # ──────────────────────────────────────────────
  auth-service:
    image: ai-gateway-app:latest
    working_dir: /app/apps/auth-service
    command: pnpm start
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-gateway_user}:${POSTGRES_PASSWORD:-gateway_pass}@postgres:5432/${POSTGRES_DB:-ai_gateway}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-super-secret-access-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      CLIENT_SECRET_ENCRYPTION_KEY: ${CLIENT_SECRET_ENCRYPTION_KEY:-your-64-char-hex-key-change-in-production}
      AUTH_EVENTS_CONSUMER_ENABLED: 'false'
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # 2. Credit Service
  # ──────────────────────────────────────────────
  credit-service:
    image: ai-gateway-app:latest
    working_dir: /app/apps/credit-service
    command: pnpm start
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER:-gateway_user}:${POSTGRES_PASSWORD:-gateway_pass}@postgres:5432/${POSTGRES_DB:-ai_gateway}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      CREDIT_LOCK_TTL_SECONDS: 30
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # 3. Gateway Service (AI Request Engine)
  # ──────────────────────────────────────────────
  gateway:
    image: ai-gateway-app:latest
    working_dir: /app/apps/gateway
    command: pnpm start
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
      credit-service:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-gateway_user}:${POSTGRES_PASSWORD:-gateway_pass}@postgres:5432/${POSTGRES_DB:-ai_gateway}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      AUTH_SERVICE_URL: http://auth-service:3003
      CREDIT_SERVICE_URL: http://credit-service:3005
      ROUTING_SERVICE_URL: http://routing-service:3006
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # 4. Routing Service
  # ──────────────────────────────────────────────
  routing-service:
    image: ai-gateway-app:latest
    working_dir: /app/apps/routing-service
    command: pnpm start
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3006
      DATABASE_URL: postgresql://${POSTGRES_USER:-gateway_user}:${POSTGRES_PASSWORD:-gateway_pass}@postgres:5432/${POSTGRES_DB:-ai_gateway}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-xxxxxxxxxxxxxxxxxxxx}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-xxxxxxxxxxxx}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-xxxxxxxxxxxxxxxxxxxx}
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # 5. Billing Service
  # ──────────────────────────────────────────────
  billing-service:
    image: ai-gateway-app:latest
    working_dir: /app/apps/billing-service
    command: pnpm start
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      credit-service:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-gateway_user}:${POSTGRES_PASSWORD:-gateway_pass}@postgres:5432/${POSTGRES_DB:-ai_gateway}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      CREDIT_SERVICE_URL: http://credit-service:3005
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_xxxxxxxxxxxx}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-xxxxxxxxxxxxxxxxxxxx}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-your-webhook-secret}
      RAZORPAY_PLAN_ID_PRO: ${RAZORPAY_PLAN_ID_PRO:-plan_test_pro_xxxxxxxxxxxx}
      RAZORPAY_PLAN_ID_MAX: ${RAZORPAY_PLAN_ID_MAX:-plan_test_max_xxxxxxxxxxxx}
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # 6. Analytics Service
  # ──────────────────────────────────────────────
  analytics-service:
    image: ai-gateway-app:latest
    working_dir: /app/apps/analytics-service
    command: pnpm start
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3007
      DATABASE_URL: postgresql://${POSTGRES_USER:-gateway_user}:${POSTGRES_PASSWORD:-gateway_pass}@postgres:5432/${POSTGRES_DB:-ai_gateway}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      CLICKHOUSE_HOST: http://clickhouse:8123
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-ai_gateway_analytics}
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # 7. Worker Service
  # ──────────────────────────────────────────────
  worker:
    image: ai-gateway-app:latest
    working_dir: /app/apps/worker
    command: pnpm start
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3008
      DATABASE_URL: postgresql://${POSTGRES_USER:-gateway_user}:${POSTGRES_PASSWORD:-gateway_pass}@postgres:5432/${POSTGRES_DB:-ai_gateway}
      KAFKA_BROKERS: kafka:29092
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # 8. API Aggregation Layer
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-gateway-app:latest
    working_dir: /app/apps/api
    command: pnpm start
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      gateway:
        condition: service_started
      credit-service:
        condition: service_started
      billing-service:
        condition: service_started
      analytics-service:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-gateway_user}:${POSTGRES_PASSWORD:-gateway_pass}@postgres:5432/${POSTGRES_DB:-ai_gateway}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-super-secret-access-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      AUTH_SERVICE_URL: http://auth-service:3003
      CREDIT_SERVICE_URL: http://credit-service:3005
      BILLING_SERVICE_URL: http://billing-service:3004
      ANALYTICS_SERVICE_URL: http://analytics-service:3007
      GATEWAY_URL: http://gateway:3002
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # 9. Next.js Public Web Frontend
  # ──────────────────────────────────────────────
  web:
    image: ai-gateway-app:latest
    working_dir: /app/apps/web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_GATEWAY_URL: http://localhost/gateway
      NEXT_PUBLIC_CONSOLE_URL: http://console.localhost
      NEXT_PUBLIC_AUTH_URL: http://localhost/auth
    command: pnpm start
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # 10. Next.js Developer Console Frontend
  # ──────────────────────────────────────────────
  console:
    image: ai-gateway-app:latest
    working_dir: /app/apps/console
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3009
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_GATEWAY_URL: http://localhost/gateway
      NEXT_PUBLIC_CONSOLE_URL: http://console.localhost
      NEXT_PUBLIC_AUTH_URL: http://localhost/auth
    command: pnpm start
    networks:
      - gateway-network

  # ──────────────────────────────────────────────
  # Nginx Reverse Proxy entrance
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - api
      - gateway
      - web
      - console
    networks:
      - gateway-network
networks:
  gateway-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
